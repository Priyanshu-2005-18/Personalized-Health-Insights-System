# =============================================================================
#  Nginx Virtual Host — Health Insights System
#  Handles:
#    • HTTP  → HTTPS redirect (port 80)
#    • HTTPS → React frontend  (port 443, /)
#    • HTTPS → FastAPI backend  (port 443, /api/v1/)
#    • HTTPS → FastAPI docs     (port 443, /docs /redoc /openapi.json)
#    • WebSocket upgrade support
#    • Static asset caching
#    • Security headers
# =============================================================================

# ── HTTP: redirect everything to HTTPS ────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name _;                    # Match all; update to $DOMAIN in production

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS: main server ────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name _;                    # Replace _ with your domain in production

    # ── SSL ──────────────────────────────────────────────────────────────────
    # Replace with Let's Encrypt paths in production:
    #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_certificate         /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key     /etc/nginx/ssl/self-signed.key;
    ssl_session_timeout     1d;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_tickets     off;
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year; include subdomains; preload once cert is stable)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: https:; \
         connect-src 'self' https:; \
         font-src 'self'; \
         frame-ancestors 'none';"
        always;

    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Request size limits ───────────────────────────────────────────────────
    client_max_body_size    2M;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;

    # ── Connection limit ──────────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── /api/v1/  → FastAPI backend ───────────────────────────────────────────
    location /api/ {
        limit_req   zone=api_limit  burst=20  nodelay;

        proxy_pass          http://api_backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Timeouts (ML inference can take a moment)
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Disable response buffering for streaming endpoints
        proxy_buffering        off;

        # CORS is handled by FastAPI — don't double-set here
    }

    # ── /docs /redoc /openapi.json  → FastAPI interactive docs ───────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /health  → API liveness (used by load balancers) ─────────────────────
    location = /healthz {
        access_log off;
        proxy_pass http://api_backend/api/v1/health;
    }

    # ── Static assets (React build — aggressive caching) ─────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        proxy_pass         http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # Let browser cache immutable hashed assets for 1 year
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header Vary          "Accept-Encoding";
        access_log off;
    }

    # ── Everything else  → React frontend (SPA catch-all) ────────────────────
    location / {
        limit_req   zone=web_limit  burst=50  nodelay;

        proxy_pass         http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA: never cache the HTML shell (index.html)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
