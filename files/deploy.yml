name: Health Insights — CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:    ghcr.io
  API_IMAGE:   ${{ github.repository }}/health-api
  WEB_IMAGE:   ${{ github.repository }}/health-frontend
  IMAGE_TAG:   ${{ github.sha }}

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pydantic-settings pytest httpx

      - name: Train model (generates artifact)
        run: python ml/training/train_model.py

      - name: Pytest
        run: pytest tests/test_api.py -v --tb=short

  # ── 2. Build & push Docker images ────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API image ──────────────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       deploy/Dockerfile.api
          target:     runtime
          push:       true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       deploy/Dockerfile.frontend
          target:     runtime
          push:       true
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ── 3. Deploy to production ───────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/health-insights/deploy
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
            docker compose pull api frontend
            docker compose up -d --no-build api frontend nginx
            docker compose exec -T api python -c \
              "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
            echo "Deployment complete: ${{ env.IMAGE_TAG }}"
