# =============================================================================
#  Health Insights System — Production Docker Compose
#  Services: postgres · api · frontend · nginx · redis · pgadmin (optional)
#
#  Usage
#  -----
#  First-run setup:
#    cp .env.example .env && nano .env   # fill in secrets
#    docker compose up -d
#
#  With monitoring stack:
#    docker compose --profile monitoring up -d
#
#  Stop everything:
#    docker compose down
#
#  Wipe volumes (destructive):
#    docker compose down -v
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: health_postgres
    <<: *default-restart
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Optimised for a 2–4 GB container
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      # Persistent data volume
      - postgres_data:/var/lib/postgresql/data
      # Initialisation scripts run once on first start (alphabetical order)
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      # Tuned postgresql.conf
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      # Expose only on localhost in production (behind firewall)
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net
    logging: *default-logging

  # ── Redis (caching / task queue) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: health_redis
    <<: *default-restart
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory   256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - backend_net
    logging: *default-logging

  # ── FastAPI ML API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      target: runtime
    image: health-insights-api:${IMAGE_TAG:-latest}
    container_name: health_api
    <<: *default-restart
    env_file:
      - .env
    environment:
      # Explicit overrides on top of .env (these win)
      DATABASE_URL:    postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      API_WORKERS:     ${API_WORKERS:-2}
      LOG_LEVEL:       ${LOG_LEVEL:-info}
    volumes:
      # Mount artifact directory so model can be hot-swapped without rebuild
      - model_artifacts:/app/ml/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend_net
      - frontend_net
    logging: *default-logging

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: health-insights-frontend:${IMAGE_TAG:-latest}
    container_name: health_frontend
    <<: *default-restart
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend_net
    logging: *default-logging

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: health_nginx
    <<: *default-restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Certbot web-root for Let's Encrypt renewal
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend_net
    logging: *default-logging

  # ── PgAdmin (optional — dev/staging only) ───────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: health_pgadmin
    <<: *default-restart
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@health.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT:      5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:5050"
    depends_on:
      - postgres
    networks:
      - backend_net
    profiles:
      - dev
    logging: *default-logging

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: health_prometheus
    <<: *default-restart
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend_net
    profiles:
      - monitoring
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: health_grafana
    <<: *default-restart
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL:         http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend_net
    profiles:
      - monitoring
    logging: *default-logging


# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_artifacts:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  certbot_webroot:
    driver: local


# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  # API ↔ postgres/redis — never exposed to the outside
  backend_net:
    driver: bridge
    internal: true

  # nginx ↔ frontend ↔ api — nginx is the only public entry point
  frontend_net:
    driver: bridge
