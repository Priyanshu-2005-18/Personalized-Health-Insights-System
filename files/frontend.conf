# =============================================================================
#  Nginx — React Frontend (internal container config)
#  Serves the Vite/React build from /usr/share/nginx/html.
#  The outer reverse-proxy (health_nginx) is the public entry point;
#  this config is only for the frontend container on port 80.
# =============================================================================

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip pre-compressed assets from the Vite build
    gzip_static on;

    # ── Health probe for Docker HEALTHCHECK ──────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Hashed static assets — cache 1 year ──────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ── SPA catch-all — all routes return index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
    }
}
