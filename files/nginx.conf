# =============================================================================
#  Nginx — Main Configuration
#  Health Insights System
# =============================================================================

user  nginx;
worker_processes  auto;              # One worker per CPU core

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

# Max open files per worker (raise OS ulimit to match)
worker_rlimit_nofile  65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;          # Don't expose Nginx version

    # ── Compression ───────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Security headers (applied globally; overridden per location) ──────────
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=web_limit:10m  rate=60r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream api_backend {
        least_conn;                   # Distribute to least-busy worker
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:80;
        keepalive 16;
    }

    # ── Virtual host configs ──────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
