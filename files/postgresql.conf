# =============================================================================
#  PostgreSQL 16 — Production Configuration
#  Tuned for: 2–4 GB RAM, SSD storage, OLTP workload (health metrics)
#  Generated for Health Insights System
#
#  Apply with:
#    docker compose uses:  command: postgres -c config_file=/etc/postgresql/postgresql.conf
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# CONNECTION SETTINGS
# ─────────────────────────────────────────────────────────────────────────────

listen_addresses            = '*'           # Docker network; firewall enforced at compose level
port                        = 5432
max_connections             = 100           # Keep low; use pgBouncer for higher concurrency
superuser_reserved_connections = 3


# ─────────────────────────────────────────────────────────────────────────────
# MEMORY  (tune for 2 GB container; scale proportionally)
# ─────────────────────────────────────────────────────────────────────────────

shared_buffers              = 512MB         # ~25% of RAM
effective_cache_size        = 1536MB        # ~75% of RAM (hint to planner)
work_mem                    = 16MB          # per sort/hash — 100 connections × 4 ops = 6.4 GB max, so keep conservative
maintenance_work_mem        = 128MB         # VACUUM, CREATE INDEX
wal_buffers                 = 16MB          # Usually auto; explicit for predictability
huge_pages                  = try


# ─────────────────────────────────────────────────────────────────────────────
# WRITE-AHEAD LOG (WAL) / DURABILITY
# ─────────────────────────────────────────────────────────────────────────────

wal_level                   = replica       # Enables streaming replication if needed
fsync                       = on            # Never turn off in production
synchronous_commit          = on
wal_compression             = on            # zstd on PG16
checkpoint_completion_target = 0.9          # Spread checkpoint I/O
min_wal_size                = 80MB
max_wal_size                = 2GB


# ─────────────────────────────────────────────────────────────────────────────
# REPLICATION  (future-proof; disabled by default)
# ─────────────────────────────────────────────────────────────────────────────

max_wal_senders             = 3
wal_keep_size               = 256MB


# ─────────────────────────────────────────────────────────────────────────────
# QUERY PLANNER
# ─────────────────────────────────────────────────────────────────────────────

random_page_cost            = 1.1           # SSD — lower than HDD default of 4.0
effective_io_concurrency    = 200           # SSD parallel I/O
default_statistics_target   = 100


# ─────────────────────────────────────────────────────────────────────────────
# PARALLEL QUERY
# ─────────────────────────────────────────────────────────────────────────────

max_worker_processes        = 4
max_parallel_workers_per_gather = 2
max_parallel_workers        = 4
max_parallel_maintenance_workers = 2


# ─────────────────────────────────────────────────────────────────────────────
# AUTOVACUUM  (keep bloat low for time-series health data)
# ─────────────────────────────────────────────────────────────────────────────

autovacuum                  = on
autovacuum_max_workers      = 3
autovacuum_naptime          = 30s           # Check more often (default 60s)
autovacuum_vacuum_scale_factor   = 0.05     # Vacuum at 5% dead rows (default 20%)
autovacuum_analyze_scale_factor  = 0.02     # Analyze at 2%
autovacuum_vacuum_cost_delay = 2ms          # Less I/O throttling on SSD


# ─────────────────────────────────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────────────────────────────────

logging_collector           = off           # Let Docker capture stdout
log_destination             = 'stderr'
log_min_duration_statement  = 1000          # Log queries > 1 s (slow query log)
log_checkpoints             = on
log_connections             = off           # Too noisy in production
log_disconnections          = off
log_lock_waits              = on
log_temp_files              = 0             # Log all temp file usage
log_line_prefix             = '%t [%p] %q%u@%d '
log_timezone                = 'UTC'


# ─────────────────────────────────────────────────────────────────────────────
# LOCALE / TIMEZONE
# ─────────────────────────────────────────────────────────────────────────────

timezone                    = 'UTC'
lc_messages                 = 'en_US.UTF-8'
lc_monetary                 = 'en_US.UTF-8'
lc_numeric                  = 'en_US.UTF-8'
lc_time                     = 'en_US.UTF-8'
default_text_search_config  = 'pg_catalog.english'


# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────

ssl                         = off           # TLS handled by Nginx; internal traffic is private Docker net
password_encryption         = scram-sha-256
