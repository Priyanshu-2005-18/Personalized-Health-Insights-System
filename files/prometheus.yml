# =============================================================================
#  Prometheus — Scrape Configuration
#  Health Insights System
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project:     health-insights

# ── Alerting ──────────────────────────────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI — exposes /metrics via prometheus-fastapi-instrumentator
  - job_name: health_api
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   health-api

  # PostgreSQL — via postgres_exporter (add to compose if needed)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Nginx — via nginx-prometheus-exporter
  # - job_name: nginx
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
