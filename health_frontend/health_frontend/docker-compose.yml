version: "3.9"

services:

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     production
    container_name: health_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      # Baked into the image at build time via vite
      VITE_API_URL: /api/v1

  # ── FastAPI Backend ───────────────────────────────────────────
  api:
    image: health-api:latest    # build from your backend Dockerfile first
    container_name: health_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/health_db
      SECRET_KEY:   change-me-in-production
    depends_on:
      - db

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: health_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       health_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

volumes:
  pg_data:
